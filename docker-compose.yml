name: supplier-agent

services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: supplier_agent_db
      POSTGRES_USER: mypes_user
      POSTGRES_PASSWORD: changeme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - supplier-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
        reservations:
          cpus: "0.5"
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mypes_user -d supplier_agent_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: 24h
      OLLAMA_LOAD_TIMEOUT: 10m
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - supplier-net
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8g
        reservations:
          cpus: "2.0"
          memory: 4g
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, utility]
    entrypoint:
      - /bin/sh
      - -c
      - |
          ollama serve &
          OLLAMA_PID=$$!
          until ollama list >/dev/null 2>&1; do sleep 2; done
          ollama pull llama3.2:3b || true
          printf 'ok' | ollama run llama3.2:3b >/dev/null 2>&1 || true
          wait "$$OLLAMA_PID"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2:3b
      OLLAMA_REQUEST_TIMEOUT: 600
    volumes:
      - ./backend:/app
      - ./prompts:/prompts:ro
      - po_pdfs:/app/generated_pos
    ports:
      - "8000:8000"
    networks:
      - supplier-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
        reservations:
          cpus: "1.0"
          memory: 1g
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/ready"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      N8N_HOST: n8n
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: supplier_agent_db
      DB_POSTGRESDB_USER: mypes_user
      DB_POSTGRESDB_PASSWORD: changeme
      N8N_ENCRYPTION_KEY: change_this_to_a_random_32char_string
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      GENERIC_TIMEZONE: America/Lima
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows
    ports:
      - "5678:5678"
    networks:
      - supplier-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
        reservations:
          cpus: "0.5"
          memory: 512m
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - supplier-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
        reservations:
          cpus: "0.25"
          memory: 256m
    depends_on:
      fastapi:
        condition: service_healthy

volumes:
  postgres_data:
  ollama_data:
  n8n_data:
  po_pdfs:

networks:
  supplier-net:
    driver: bridge
